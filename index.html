<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Snap Flower</title>
  <style>
    * {
      margin: 0; padding: 0; box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body { height: 100%; overscroll-behavior: none; }

    body {
      background: radial-gradient(ellipse at center, #0d1b2a 0%, #030510 100%);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: Georgia, serif;
      color: #fff;
      overflow: hidden;
      user-select: none;
    }

    #starsCanvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    .content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: clamp(8px, 1.8vh, 18px);
      padding: 0 16px;
      width: 100%;
    }

    #stateLabel {
      font-size: clamp(13px, 4.5vw, 22px);
      letter-spacing: clamp(2px, 1vw, 5px);
      text-transform: uppercase;
      color: #ffd6e0;
    }

    /* canvas dimensions are set by JS */
    #flowerCanvas { display: block; }

    #instruction {
      font-size: clamp(10px, 3vw, 13px);
      letter-spacing: clamp(1px, 0.4vw, 2px);
      opacity: 0.55;
      text-align: center;
      max-width: min(360px, 90vw);
      line-height: 1.5;
    }

    /* ── Camera preview ── */
    #camWrap {
      position: fixed;
      top: 16px;
      right: 16px;
      width: clamp(110px, 26vw, 200px);
      aspect-ratio: 4 / 3;
      border-radius: 12px;
      overflow: hidden;
      border: 2px solid rgba(255,200,215,0.35);
      box-shadow: 0 4px 20px rgba(0,0,0,0.55);
      z-index: 10;
    }

    #camVideo {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scaleX(-1); /* mirror for selfie view */
    }

    #camCanvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      transform: scaleX(-1); /* same mirror so landmarks align */
    }

    #camDot {
      position: fixed;
      top: 20px;
      right: 20px;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #e74c3c;
      z-index: 11;
      transition: background 0.5s;
      pointer-events: none;
    }

    #camDot.live {
      background: #2ecc71;
      animation: blink 2s infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.35; }
    }

    /* ── Overlays ── */
    #snapFlash {
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at 50% 40%,
        rgba(255,220,235,0.22) 0%, transparent 70%);
      pointer-events: none;
      z-index: 50;
      opacity: 0;
      transition: opacity 0.07s;
    }
    #snapFlash.show { opacity: 1; }

    #snapLabel {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: clamp(18px, 6vw, 28px);
      letter-spacing: 6px;
      color: #ffb3d0;
      text-shadow: 0 0 20px rgba(255,150,200,0.8);
      pointer-events: none;
      z-index: 60;
      opacity: 0;
      text-transform: uppercase;
      transition: opacity 0.1s;
    }
    #snapLabel.show { opacity: 1; }

    #snapCount {
      position: fixed;
      bottom: clamp(10px, 2.5vh, 22px);
      font-size: clamp(10px, 2.5vw, 12px);
      letter-spacing: 3px;
      opacity: 0.38;
      z-index: 1;
    }

    #noCam {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      font-size: clamp(11px, 3vw, 13px);
      letter-spacing: 2px;
      color: #ff8888;
      opacity: 0;
      transition: opacity 0.5s;
      z-index: 5;
      text-align: center;
      padding: 0 20px;
    }
    #noCam.show { opacity: 1; }
  </style>
</head>
<body>

<canvas id="starsCanvas"></canvas>
<div id="snapFlash"></div>
<div id="snapLabel">SNAP!</div>

<div class="content">
  <div id="stateLabel">Ready to Bloom</div>
  <canvas id="flowerCanvas"></canvas>
  <div id="instruction">Snap your fingers in front of the camera to bloom the flower</div>
</div>

<div id="camWrap">
  <video id="camVideo" autoplay playsinline muted></video>
  <canvas id="camCanvas"></canvas>
</div>
<div id="camDot"></div>
<div id="snapCount">SNAPS: 0</div>
<div id="noCam">Camera permission required — please allow and refresh</div>

<!-- Only hands.js needed; camera_utils is replaced by direct getUserMedia -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

<script>
'use strict';

// ═══════════════════════════════════════════════════════════
//  DEVICE DETECTION
// ═══════════════════════════════════════════════════════════
const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent)
              || 'ontouchstart' in window;

// ═══════════════════════════════════════════════════════════
//  RESPONSIVE CANVAS SIZING  (runs before FlowerRenderer)
// ═══════════════════════════════════════════════════════════
const flowerCanvas = document.getElementById('flowerCanvas');

function calcFlowerSize() {
  const vw = window.innerWidth;
  const vh = window.innerHeight;
  // leave vertical room for label (~40px), instruction (~40px), counter (~40px)
  const availH = vh - 140;
  const availW = vw * 0.90;
  const RATIO  = 400 / 520; // internal aspect ratio width:height
  let w = Math.min(400, availW);
  let h = w / RATIO;
  if (h > availH) { h = availH; w = h * RATIO; }
  return { w: Math.round(w), h: Math.round(h) };
}

function applyFlowerSize() {
  const { w, h } = calcFlowerSize();
  flowerCanvas.width  = w;
  flowerCanvas.height = h;
}

applyFlowerSize();

// ═══════════════════════════════════════════════════════════
//  STARS BACKGROUND
// ═══════════════════════════════════════════════════════════
(function () {
  const cv = document.getElementById('starsCanvas');
  const cx = cv.getContext('2d');
  let stars = [];

  function resize() {
    cv.width  = window.innerWidth;
    cv.height = window.innerHeight;
    stars = Array.from({ length: 200 }, () => ({
      x:     Math.random() * cv.width,
      y:     Math.random() * cv.height,
      r:     Math.random() * 1.4 + 0.3,
      base:  Math.random() * 0.55 + 0.1,
      phase: Math.random() * Math.PI * 2,
      spd:   Math.random() * 0.018 + 0.006,
    }));
  }

  let t = 0;
  function tick() {
    t++;
    cx.clearRect(0, 0, cv.width, cv.height);
    for (const s of stars) {
      const a = s.base + 0.22 * Math.sin(t * s.spd + s.phase);
      cx.beginPath();
      cx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      cx.fillStyle = `rgba(255,240,252,${Math.max(0, a)})`;
      cx.fill();
    }
    requestAnimationFrame(tick);
  }

  resize();
  tick();
  window.addEventListener('resize', resize);
})();


// ═══════════════════════════════════════════════════════════
//  FLOWER RENDERER
// ═══════════════════════════════════════════════════════════
const FS = { BUD: 0, BLOOMING: 1, BLOOMED: 2, WITHERING: 3, WITHERED: 4, RESETTING: 5 };

class FlowerRenderer {
  constructor(canvas) {
    this.cv  = canvas;
    this.ctx = canvas.getContext('2d');
    this._readDims();

    this.state     = FS.BUD;
    this.bloomP    = 0;   // 0→1 bud → bloom
    this.witherP   = 0;   // 0→1 bloom → withered
    this.resetFade = 0;   // 0→1 fade-out on reset
    this.time      = 0;
    this.particles = [];

    this._loop();
  }

  _readDims() {
    this.W  = this.cv.width;
    this.H  = this.cv.height;
    this.cx = this.W / 2;
    this.cy = this.H * 0.40;
    this.sc = this.W / 400; // scale factor relative to reference 400px width
  }

  // called after canvas is resized
  resize() { this._readDims(); }

  // ── public transitions ───────────────────────────────────
  bloom() {
    if (this.state === FS.BUD || this.state === FS.WITHERED) {
      this.state = FS.BLOOMING; this.bloomP = 0; this.witherP = 0;
    }
  }
  wither() {
    if (this.state === FS.BLOOMING || this.state === FS.BLOOMED) {
      this.state = FS.WITHERING; this.witherP = 0;
    }
  }
  reset() { this.state = FS.RESETTING; this.resetFade = 0; }

  // ── loop ─────────────────────────────────────────────────
  _loop() {
    this._update();
    this._draw();
    requestAnimationFrame(() => this._loop());
  }

  _update() {
    this.time += 0.016;
    switch (this.state) {
      case FS.BLOOMING:
        this.bloomP = Math.min(1, this.bloomP + 0.014);
        if (this.bloomP < 0.85 && Math.random() < 0.25) this._spawnParticle();
        if (this.bloomP >= 1) this.state = FS.BLOOMED;
        break;
      case FS.WITHERING:
        this.witherP = Math.min(1, this.witherP + 0.011);
        if (this.witherP >= 1) this.state = FS.WITHERED;
        break;
      case FS.RESETTING:
        this.resetFade = Math.min(1, this.resetFade + 0.04);
        if (this.resetFade >= 1) {
          this.state = FS.BUD; this.bloomP = 0;
          this.witherP = 0; this.resetFade = 0; this.particles = [];
        }
        break;
    }
    for (const p of this.particles) {
      p.x += p.vx; p.y += p.vy; p.vy += 0.06; p.vx *= 0.98;
      p.life -= p.decay; p.r *= 0.96;
    }
    this.particles = this.particles.filter(p => p.life > 0 && p.r > 0.3);
  }

  _spawnParticle() {
    const a = Math.random() * Math.PI * 2;
    const sp = Math.random() * 2.2 + 0.6;
    const colors = ['#ff85c2','#ffb3d0','#ff6b9d','#ffd6e7','#ff79b8','#ffc0da'];
    this.particles.push({
      x: this.cx + Math.cos(a) * 15 * this.sc,
      y: this.cy + Math.sin(a) * 15 * this.sc,
      vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - 2.2,
      r: (Math.random() * 4.5 + 2) * this.sc,
      life: 1, decay: Math.random() * 0.018 + 0.008,
      color: colors[Math.floor(Math.random() * colors.length)],
    });
  }

  // ── draw ─────────────────────────────────────────────────
  _draw() {
    const { ctx, W, H } = this;
    ctx.clearRect(0, 0, W, H);

    ctx.save();
    ctx.globalAlpha = this.state === FS.RESETTING ? 1 - this.resetFade : 1;

    if (this.bloomP > 0) {
      const gp = this.bloomP * (1 - this.witherP * 0.8);
      const g  = ctx.createRadialGradient(this.cx, H - 10, 0, this.cx, H - 10, 130 * this.sc);
      g.addColorStop(0, `rgba(255,130,170,${0.18 * gp})`);
      g.addColorStop(1, 'transparent');
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, W, H);
    }

    this._drawStem();
    if (this.bloomP > 0) { this._drawPetals(); this._drawCenter(); }
    if (this.bloomP < 0.85) this._drawBud();

    for (const p of this.particles) {
      ctx.save();
      ctx.globalAlpha *= p.life;
      ctx.fillStyle = p.color;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.fill();
      ctx.restore();
    }

    ctx.restore();
  }

  _drawStem() {
    const { ctx, cx, cy, H, witherP, sc } = this;
    const bottomY = H - 28 * sc;
    const bend    = witherP * 30 * sc;
    const midY    = cy + (bottomY - cy) * 0.5;
    const sat     = Math.round(60 - witherP * 40);
    const g = ctx.createLinearGradient(0, bottomY, 0, cy);
    g.addColorStop(0, `hsl(135,${sat}%,${Math.round(22 + witherP * 20)}%)`);
    g.addColorStop(1, `hsl(135,${sat}%,${Math.round(38 + witherP * 20)}%)`);
    ctx.beginPath();
    ctx.moveTo(cx, bottomY);
    ctx.quadraticCurveTo(cx + bend, midY, cx, cy);
    ctx.strokeStyle = g;
    ctx.lineWidth   = Math.max(3, 7 * sc);
    ctx.lineCap     = 'round';
    ctx.stroke();
    this._drawLeaf(cx, cy + (bottomY - cy) * 0.38, -1);
    this._drawLeaf(cx, cy + (bottomY - cy) * 0.56,  1);
  }

  _drawLeaf(x, y, side) {
    const { ctx, witherP, sc } = this;
    const len   = 58 * sc * (1 - witherP * 0.35);
    const droop = witherP * 0.5;
    ctx.save(); ctx.translate(x, y);
    ctx.beginPath(); ctx.moveTo(0, 0);
    ctx.bezierCurveTo(
      side * len * 0.55, -len * (0.32 - droop),
      side * len,        -len * (0.08 - droop * 0.4),
      side * len * 1.1,   len * 0.18
    );
    ctx.bezierCurveTo(
      side * len * 0.45,  len * 0.08,
      side * len * 0.18,  len * 0.06,
      0, 0
    );
    ctx.fillStyle = `hsl(130,${Math.round(65 - witherP * 45)}%,${Math.round(32 + witherP * 22)}%)`;
    ctx.fill(); ctx.restore();
  }

  _drawBud() {
    const { ctx, cx, cy, bloomP, sc } = this;
    const sz = 30 * sc * (1 - bloomP);
    if (sz < 1) return;

    for (let i = 0; i < 5; i++) {
      const a = (i / 5) * Math.PI * 2 - Math.PI / 2;
      ctx.save(); ctx.translate(cx, cy);
      ctx.rotate(a);
      ctx.rotate((1 - bloomP) * 0.22 * (i % 2 === 0 ? 1 : -1));
      ctx.beginPath(); ctx.moveTo(0, 0);
      ctx.bezierCurveTo(-sz * 0.28, -sz * 0.55, -sz * 0.18, -sz, 0, -sz * 1.25);
      ctx.bezierCurveTo( sz * 0.18, -sz,  sz * 0.28, -sz * 0.55, 0, 0);
      ctx.fillStyle = `hsl(130,55%,${Math.round(28 + bloomP * 10)}%)`;
      ctx.fill(); ctx.restore();
    }

    const tipA = 0.85 - bloomP * 0.7;
    if (tipA > 0) {
      const tg = ctx.createRadialGradient(cx, cy - sz * 0.4, 0, cx, cy - sz * 0.4, sz * 0.45);
      tg.addColorStop(0, `rgba(255,160,185,${tipA})`);
      tg.addColorStop(1, `rgba(255,100,140,${tipA * 0.3})`);
      ctx.beginPath(); ctx.arc(cx, cy - sz * 0.4, sz * 0.42, 0, Math.PI * 2);
      ctx.fillStyle = tg; ctx.fill();
    }
  }

  _drawPetals() {
    const { ctx, cx, cy, bloomP, witherP, time, sc } = this;
    const layers = [
      { count: 5, baseAngle: 0,           len: 95 * sc, wid: 34 * sc },
      { count: 5, baseAngle: Math.PI / 5, len: 80 * sc, wid: 28 * sc },
    ];

    for (const layer of layers) {
      for (let i = 0; i < layer.count; i++) {
        const angle    = layer.baseAngle + (i / layer.count) * Math.PI * 2;
        const delay    = (i / layer.count) * 0.45;
        const lbp      = Math.max(0, Math.min(1, (bloomP - delay) / (1 - delay + 0.001)));
        const droopAmt = witherP * (0.55 + 0.2 * Math.abs(Math.sin(angle)));
        const droopDir = Math.sign(Math.sin(angle + 0.3));
        const len      = layer.len * lbp * (1 - witherP * 0.45);
        const wid      = layer.wid * lbp * (1 - witherP * 0.35);
        const opacity  = lbp * (1 - witherP * 0.72);
        if (len < 1 || opacity < 0.02) continue;

        const sway = this.state === FS.BLOOMED
          ? Math.sin(time * 0.9 + i * 0.8 + layer.baseAngle) * 0.04 : 0;

        ctx.save(); ctx.translate(cx, cy);
        ctx.rotate(angle + sway);
        ctx.rotate(droopDir * droopAmt * Math.PI * 0.6);
        ctx.globalAlpha = opacity;

        const sat = Math.round(80 - witherP * 55);
        const lit = Math.round(65 + witherP * 18);
        const pg  = ctx.createLinearGradient(0, 0, 0, -len);
        pg.addColorStop(0,   `hsl(330,${sat}%,${lit - 10}%)`);
        pg.addColorStop(0.5, `hsl(330,${sat}%,${lit}%)`);
        pg.addColorStop(1,   `hsl(315,${sat - 15}%,${lit + 12}%)`);

        ctx.beginPath(); ctx.moveTo(0, 0);
        ctx.bezierCurveTo(-wid, -len * 0.28, -wid * 0.85, -len * 0.72, 0, -len);
        ctx.bezierCurveTo( wid * 0.85, -len * 0.72, wid, -len * 0.28, 0, 0);
        ctx.fillStyle = pg; ctx.fill();

        ctx.beginPath(); ctx.moveTo(0, -3 * sc);
        ctx.quadraticCurveTo(0, -len * 0.5, 0, -len + 6 * sc);
        ctx.strokeStyle = 'rgba(255,200,220,0.28)'; ctx.lineWidth = 1; ctx.stroke();

        ctx.restore();
      }
    }
  }

  _drawCenter() {
    const { ctx, cx, cy, bloomP, witherP, time, sc } = this;
    if (bloomP < 0.25) return;
    const r    = 24 * sc * bloomP * (1 - witherP * 0.55);
    const fade = (bloomP - 0.25) / 0.75;
    const sat  = Math.round(80 - witherP * 52);
    const lit  = Math.round(65 + witherP * 16);

    const glow = ctx.createRadialGradient(cx, cy, 0, cx, cy, r * 1.7);
    glow.addColorStop(0, `hsla(45,${sat}%,${lit}%,${fade * 0.35})`);
    glow.addColorStop(1, 'transparent');
    ctx.fillStyle = glow; ctx.beginPath(); ctx.arc(cx, cy, r * 1.7, 0, Math.PI * 2); ctx.fill();

    const cg = ctx.createRadialGradient(cx - r * 0.25, cy - r * 0.25, 0, cx, cy, r);
    cg.addColorStop(0, `hsl(50,${sat}%,${lit + 10}%)`);
    cg.addColorStop(1, `hsl(35,${sat - 15}%,${lit - 15}%)`);
    ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.globalAlpha = fade; ctx.fillStyle = cg; ctx.fill(); ctx.globalAlpha = 1;

    if (bloomP > 0.65) {
      const dotA = Math.min(1, (bloomP - 0.65) / 0.35) * (1 - witherP * 0.85);
      for (let i = 0; i < 10; i++) {
        const a  = (i / 10) * Math.PI * 2 + time * 0.08;
        ctx.beginPath();
        ctx.arc(cx + Math.cos(a) * r * 0.62, cy + Math.sin(a) * r * 0.62, 2.2 * sc, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(100,45,15,${dotA})`; ctx.fill();
      }
    }
  }
}


// ═══════════════════════════════════════════════════════════
//  SNAP DETECTOR
// ═══════════════════════════════════════════════════════════
class SnapDetector {
  constructor(onSnap) {
    this.onSnap    = onSnap;
    this.history   = [];
    this.HIST      = 6;
    this.lastSnap  = 0;
    this.COOLDOWN  = 1400;  // ms
    this.CLOSE_THR = 0.065; // normalized finger distance → "pinched"
    this.FAR_THR   = 0.125; // normalized finger distance → "released"
    this.VEL_THR   = 0.055; // minimum speed of separation
  }

  process(landmarks) {
    if (!landmarks || landmarks.length < 21) { this.history = []; return; }
    const t = landmarks[4]; // thumb tip
    const m = landmarks[12]; // middle finger tip
    const d = Math.hypot(t.x - m.x, t.y - m.y);

    this.history.push(d);
    if (this.history.length > this.HIST) this.history.shift();
    if (this.history.length < 4) return;

    const h    = this.history;
    const prev = (h[h.length - 4] + h[h.length - 3]) / 2; // avg of 2 earlier frames
    const cur  = h[h.length - 1];

    if (prev < this.CLOSE_THR && cur > this.FAR_THR && (cur - prev) > this.VEL_THR) {
      const now = Date.now();
      if (now - this.lastSnap > this.COOLDOWN) {
        this.lastSnap = now;
        this.onSnap();
      }
    }
  }
}


// ═══════════════════════════════════════════════════════════
//  APP
// ═══════════════════════════════════════════════════════════
const flower      = new FlowerRenderer(flowerCanvas);
const stateLabel  = document.getElementById('stateLabel');
const instruction = document.getElementById('instruction');
const snapFlash   = document.getElementById('snapFlash');
const snapLabelEl = document.getElementById('snapLabel');
const snapCountEl = document.getElementById('snapCount');
const noCamEl     = document.getElementById('noCam');

const PHASES = [
  { label: 'Ready to Bloom', hint: 'Snap your fingers in front of the camera to bloom the flower' },
  { label: 'In Full Bloom',  hint: 'Snap again to wither the flower' },
  { label: 'Withered',       hint: 'Snap once more to reset the flower' },
];

let phase = 0, snapTotal = 0;

function onSnap() {
  snapTotal++;
  snapCountEl.textContent = `SNAPS: ${snapTotal}`;

  snapFlash.classList.add('show');
  setTimeout(() => snapFlash.classList.remove('show'), 180);
  snapLabelEl.classList.add('show');
  setTimeout(() => snapLabelEl.classList.remove('show'), 600);

  if (phase === 0)      { flower.bloom();  phase = 1; }
  else if (phase === 1) { flower.wither(); phase = 2; }
  else                  { flower.reset();  phase = 0; }

  stateLabel.textContent  = PHASES[phase].label;
  instruction.textContent = PHASES[phase].hint;
}

const snapDetector = new SnapDetector(onSnap);

window.addEventListener('resize', () => {
  applyFlowerSize();
  flower.resize();
  syncCamCanvasSize();
});


// ═══════════════════════════════════════════════════════════
//  CAMERA & HAND OVERLAY
// ═══════════════════════════════════════════════════════════
const camVideo  = document.getElementById('camVideo');
const camCanvas = document.getElementById('camCanvas');
const camCtx    = camCanvas.getContext('2d');
const camDot    = document.getElementById('camDot');

function syncCamCanvasSize() {
  const wrap = document.getElementById('camWrap');
  const rect  = wrap.getBoundingClientRect();
  if (rect.width > 0) {
    camCanvas.width  = Math.round(rect.width);
    camCanvas.height = Math.round(rect.height);
  }
}

const CONNECTIONS = [
  [0,1],[1,2],[2,3],[3,4],
  [0,5],[5,6],[6,7],[7,8],
  [0,9],[9,10],[10,11],[11,12],
  [0,13],[13,14],[14,15],[15,16],
  [0,17],[17,18],[18,19],[19,20],
  [5,9],[9,13],[13,17],
];

function drawHandOverlay(lm) {
  const w = camCanvas.width, h = camCanvas.height;
  camCtx.clearRect(0, 0, w, h);
  if (!lm) return;

  camCtx.strokeStyle = 'rgba(255,180,210,0.55)';
  camCtx.lineWidth   = 1.5;
  for (const [a, b] of CONNECTIONS) {
    camCtx.beginPath();
    camCtx.moveTo(lm[a].x * w, lm[a].y * h);
    camCtx.lineTo(lm[b].x * w, lm[b].y * h);
    camCtx.stroke();
  }

  for (const p of lm) {
    camCtx.beginPath();
    camCtx.arc(p.x * w, p.y * h, 2.5, 0, Math.PI * 2);
    camCtx.fillStyle = 'rgba(255,200,220,0.75)';
    camCtx.fill();
  }

  const thumb = lm[4], mid = lm[12];
  const dist  = Math.hypot((thumb.x - mid.x) * w, (thumb.y - mid.y) * h);
  const close = dist < w * 0.085;
  const lineColor = close ? 'rgba(120,255,160,0.8)' : 'rgba(180,180,220,0.5)';
  const dotColor  = close ? '#90ff98' : null;

  camCtx.beginPath();
  camCtx.moveTo(thumb.x * w, thumb.y * h);
  camCtx.lineTo(mid.x * w,   mid.y * h);
  camCtx.strokeStyle = lineColor; camCtx.lineWidth = 2; camCtx.stroke();

  camCtx.beginPath(); camCtx.arc(thumb.x * w, thumb.y * h, 5, 0, Math.PI * 2);
  camCtx.fillStyle = dotColor || '#ffb347'; camCtx.fill();

  camCtx.beginPath(); camCtx.arc(mid.x * w, mid.y * h, 5, 0, Math.PI * 2);
  camCtx.fillStyle = dotColor || '#87ceeb'; camCtx.fill();
}


// ═══════════════════════════════════════════════════════════
//  MEDIAPIPE HANDS
// ═══════════════════════════════════════════════════════════
const hands = new Hands({
  locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`,
});

hands.setOptions({
  maxNumHands:            1,
  modelComplexity:        isMobile ? 0 : 1, // lite model on mobile for speed
  minDetectionConfidence: 0.60,
  minTrackingConfidence:  0.55,
});

hands.onResults(results => {
  const lm = results.multiHandLandmarks?.[0] ?? null;
  drawHandOverlay(lm);
  snapDetector.process(lm);
});


// ═══════════════════════════════════════════════════════════
//  CAMERA INIT  (direct getUserMedia → no camera_utils dep)
// ═══════════════════════════════════════════════════════════
async function startCamera() {
  // Try progressively looser constraints so we always get the front camera
  const attempts = [
    { video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } } },
    { video: { facingMode: 'user' } },
    { video: { width: { ideal: 640 }, height: { ideal: 480 } } },
    { video: true },
  ];

  for (const constraints of attempts) {
    try {
      const stream = await navigator.mediaDevices.getUserMedia(constraints);
      camVideo.srcObject = stream;
      await new Promise((res) => {
        camVideo.onloadedmetadata = res;
        setTimeout(res, 3000); // safety timeout
      });
      await camVideo.play();
      camDot.classList.add('live');
      syncCamCanvasSize();
      startFrameLoop();
      return;
    } catch (e) {
      console.warn('Camera constraint failed, retrying:', e.message);
    }
  }

  noCamEl.classList.add('show');
}

// throttled frame loop — never queues a new send while one is in flight
function startFrameLoop() {
  let busy = false;
  function loop() {
    requestAnimationFrame(loop);
    if (busy || camVideo.readyState < 2 || camVideo.paused) return;
    busy = true;
    hands.send({ image: camVideo })
      .catch(e => console.warn('hands.send:', e))
      .finally(() => { busy = false; });
  }
  loop();
}

startCamera();
</script>
